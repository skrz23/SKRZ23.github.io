<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ultimate</title>

<style>
:root { --primary:#38bdf8; }

body{
    margin:0;
    font-family:'Segoe UI',Arial;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* PROGRESS */
.progress{
    position:fixed;top:0;left:0;height:3px;width:0%;
    background:var(--primary);z-index:9999;
}

/* NAVBAR */
.navbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:15px 20px;background:rgba(2,6,23,0.7);
    backdrop-filter:blur(10px);
}

.title{color:var(--primary);font-weight:bold;}

.menu{display:flex;gap:15px;align-items:center;}
.menu span{cursor:pointer;color:#94a3b8;}
.menu span:hover,.active{color:var(--primary);}

.btn{
    background:var(--primary);border:none;
    padding:6px 10px;border-radius:6px;cursor:pointer;
}

/* MOBILE */
.hamburger{display:none;font-size:22px;cursor:pointer;}

.sidebar{
    position:fixed;top:0;left:0;width:260px;height:100%;
    background:#020617;padding:20px;
    transform:translateX(-100%);
    transition:0.3s;z-index:1000;
}
.sidebar.active{transform:translateX(0);}
.sidebar span{display:block;padding:12px 0;cursor:pointer;}

.overlay-menu{
    position:fixed;inset:0;background:rgba(0,0,0,0.5);
    display:none;z-index:999;
}
.overlay-menu.active{display:block;}

/* MAIN */
.main{padding:15px;}
.status{font-size:13px;color:#94a3b8;text-align:right;margin-bottom:8px;}

/* ZOOM */
.zoom-control{
    display:flex;align-items:center;gap:10px;margin-bottom:10px;color:#94a3b8;
}

/* CARD */
.card{
    background:rgba(2,6,23,0.7);
    border-radius:12px;padding:10px;
}

/* IFRAME */
.iframe-wrapper{
    width:100%;overflow:auto;
}

.iframe-wrapper iframe{
    width:1200px;
    height:calc(100vh - 220px);
    border:none;
    transform-origin:top left;
}

/* LOADING */
.overlay{
    position:fixed;inset:0;background:rgba(2,6,23,0.6);
    display:flex;justify-content:center;align-items:center;
    opacity:0;pointer-events:none;transition:0.3s;
}
.overlay.active{opacity:1;pointer-events:all;}

.loader{
    width:40px;height:40px;border:4px solid var(--primary);
    border-top:transparent;border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* FULLSCREEN */
body.fullscreen .navbar{display:none;}
body.fullscreen .main{padding:5px;}
body.fullscreen iframe{height:100vh !important;}

/* MOBILE */
@media(max-width:768px){
    .menu{display:none;}
    .hamburger{display:block;}
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="navbar">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="title">📊 Dashboard</div>

    <div class="menu">
        <span onclick="loadFrame(this,'live')">2026</span>
        <span onclick="loadFrame(this,'auto')">2027</span>
        <span onclick="loadFrame(this,'nogid')">Paruh</span>
        <span onclick="openDrive()">Drive</span>

        <button class="btn" onclick="refreshFrame()">🔄</button>
        <button class="btn" onclick="printFrame()">🖨</button>
        <button class="btn" onclick="toggleFullscreen()">⛶</button>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <span onclick="loadFrameMobile('live')">GAJI 2026</span>
    <span onclick="loadFrameMobile('auto')">GAJI 2027</span>
    <span onclick="loadFrameMobile('nogid')">PARUH WAKTU</span>
    <span onclick="openDrive()">SELENGKAPNYA</span>
    <span onclick="refreshFrame()">🔄 Refresh</span>
    <span onclick="printFrame()">🖨 Print</span>
    <span onclick="toggleFullscreen()">⛶ Fullscreen</span>
</div>

<div class="overlay-menu" id="overlayMenu" onclick="toggleMenu()"></div>

<div class="main">

    <div class="status" id="status">Terakhir diperbarui: -</div>

    <div class="zoom-control">
        🔍 <input type="range" id="zoomSlider" min="50" max="120" value="100">
        <span id="zoomValue">100%</span>
    </div>

    <div class="card">
        <div class="iframe-wrapper">
            <iframe id="frame"></iframe>
        </div>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="loader"></div>
</div>

<script>
let currentURL="";

const urls={
 live:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZsBA_TeLq6n4PrNuJCXu6wcb9pLrFgOlt5-XYeE36laNYDyAsIYZsegCpimpYqPyZgdsFnVufCPLx/pubhtml?widget=true&headers=false",
 auto:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQxf_X6dfVDKPbeUU1BJUHEEgUrlDco1gg1PbeW3zVvzIaWXOKPdVl9Yb5xWNMtcST72ZK-XVeF-bkv/pubhtml?widget=true&headers=false",
 nogid:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTzheNoPSUBL51N_QRLTiaZLyPkWK6-sfhTVVTVjwu9_r5idwjBLxaukKhcOXVWhHpLzEn6_AzEijnO/pubhtml?widget=true&headers=false"
};

function loadFrame(el,type){
 currentURL=urls[type];
 startLoading();
 frame.src=currentURL;

 if(el){
  document.querySelectorAll(".menu span").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
 }
}

function loadFrameMobile(type){
 toggleMenu();
 loadFrame(null,type);
}

function refreshFrame(){
 if(!currentURL)return;
 startLoading();
 frame.src=currentURL+"&t="+Date.now();
}

/* PRINT */
function printFrame(){
 if(!currentURL)return;
 const win=window.open(currentURL,"_blank");
 setTimeout(()=>win.print(),1200);
}

/* DRIVE */
function openDrive(){
 window.open("https://drive.google.com/drive/folders/1GfuS0oksQCSDwwXWN999Sp2YHRfOANOs","_blank");
}

/* SIDEBAR */
function toggleMenu(){
 sidebar.classList.toggle("active");
 overlayMenu.classList.toggle("active");
}

/* LOADING */
function startLoading(){
 overlay.classList.add("active");
 progress.style.width="70%";
}

function stopLoading(){
 progress.style.width="100%";
 setTimeout(()=>{
  progress.style.width="0%";
  overlay.classList.remove("active");
 },300);
}

function updateTime(){
 status.innerText="Terakhir diperbarui: "+new Date().toLocaleTimeString("id-ID");
}

/* ZOOM MANUAL */
zoomSlider.oninput=function(){
 const scale=this.value/100;
 frame.style.transform="scale("+scale+")";
 zoomValue.innerText=this.value+"%";
};

/* AUTO ZOOM */
function autoZoom(){
 const wrapper=document.querySelector(".iframe-wrapper");
 let scale=wrapper.clientWidth/1200;

 if(scale>1) scale=1;
 if(scale<0.5) scale=0.5;

 frame.style.transform="scale("+scale+")";

 let percent=Math.round(scale*100);
 zoomSlider.value=percent;
 zoomValue.innerText=percent+"%";
}

/* FULLSCREEN */
function toggleFullscreen(){
 if(!document.fullscreenElement){
  document.documentElement.requestFullscreen();
  document.body.classList.add("fullscreen");
 }else{
  document.exitFullscreen();
  document.body.classList.remove("fullscreen");
 }
}

document.addEventListener("fullscreenchange",()=>{
 if(!document.fullscreenElement){
  document.body.classList.remove("fullscreen");
 }
});

/* EVENTS */
window.addEventListener("resize",autoZoom);

frame.onload=()=>{
 stopLoading();
 updateTime();
 autoZoom();
};

window.onload=()=>{
 loadFrame(null,"live");
};
</script>

</body>
</html>
