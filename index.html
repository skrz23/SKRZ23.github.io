<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Google Sheets</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #020617;
    padding: 20px;
}

.sidebar h2 {
    color: #38bdf8;
}

.menu {
    margin-top: 20px;
}

.menu button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    background: #1e293b;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    background: #38bdf8;
    color: black;
}

.menu button.active {
    background: #38bdf8;
    color: black;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Header */
.header {
    margin-bottom: 15px;
}

.header h1 {
    margin: 0;
}

/* Card */
.card {
    background: #020617;
    padding: 10px;
    border-radius: 12px;
}

/* Iframe */
iframe {
    width: 100%;
    height: 80vh;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>📊 Dashboard</h2>
    <p>Google Sheets Viewer</p>

    <div class="menu">
        <button class="active" onclick="loadSheet(0)">Sheet 1</button>
        <button onclick="loadSheet(1)">Sheet 2</button>
        <button onclick="loadSheet(2)">Sheet 3</button>
    </div>
</div>

<div class="main">

    <div class="header">
        <h1>Dashboard Data</h1>
        <p>Realtime dari Google Sheets</p>
    </div>

    <div class="card">
        <iframe id="frame"></iframe>
    </div>

</div>

<script>

// 🔥 GANTI GID DI SINI
const sheets = [
    "https://docs.google.com/spreadsheets/d/1C4UkMOVITHvJw1LyHNPz5PA6JtUSxPDVPOljtyZl0mw/pubhtml?gid=0&single=true",
    "https://docs.google.com/spreadsheets/d/1C4UkMOVITHvJw1LyHNPz5PA6JtUSxPDVPOljtyZl0mw/pubhtml?gid=123456789&single=true",
    "https://docs.google.com/spreadsheets/d/1C4UkMOVITHvJw1LyHNPz5PA6JtUSxPDVPOljtyZl0mw/pubhtml?gid=987654321&single=true"
];

function loadSheet(i){
    document.getElementById("frame").src = sheets[i];

    document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".menu button")[i].classList.add("active");
}

// default load
loadSheet(0);

</script>

</body>
</html>
