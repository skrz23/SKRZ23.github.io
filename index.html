<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Premium</title>

<style>
:root {
    --primary: #38bdf8;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

/* PROGRESS */
.progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--primary);
    z-index: 9999;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(2,6,23,0.7);
    backdrop-filter: blur(10px);
}

.title {
    color: var(--primary);
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 20px;
    align-items: center;
}

.menu span {
    cursor: pointer;
    color: #94a3b8;
}

.menu span:hover,
.active {
    color: var(--primary);
}

/* BUTTON */
.btn {
    background: var(--primary);
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* MOBILE */
.hamburger {
    display: none;
    font-size: 22px;
    cursor: pointer;
}

.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100%;
    background: #020617;
    padding: 20px;
    transition: 0.3s;
    z-index: 1000;
}

.sidebar.active {
    left: 0;
}

.sidebar span {
    display: block;
    padding: 12px 0;
    cursor: pointer;
}

.overlay-menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
}

.overlay-menu.active {
    display: block;
}

/* MAIN */
.main {
    padding: 15px;
}

.status {
    font-size: 13px;
    color: #94a3b8;
    text-align: right;
    margin-bottom: 8px;
}

/* CARD */
.card {
    background: rgba(2,6,23,0.7);
    border-radius: 12px;
    padding: 10px;
}

/* ✅ FIX IFRAME */
.iframe-wrapper {
    width: 100%;
    overflow: auto;
    display: flex;
    justify-content: center;
}

.iframe-wrapper iframe {
    width: 100%;
    min-width: 900px;
    height: calc(100vh - 180px);
    border: none;
    border-radius: 10px;
    transform-origin: top center;
}

/* LOADING */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,6,23,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    pointer-events: all;
}

.loader {
    width: 40px;
    height: 40px;
    border: 4px solid var(--primary);
    border-top: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* MOBILE */
@media(max-width:768px){
    .menu { display:none; }
    .hamburger { display:block; }

    .iframe-wrapper iframe {
        transform: scale(0.85);
    }
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="navbar">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="title">📊 Dashboard</div>

    <div class="menu">
        <span onclick="loadFrame(this,'live')">2026</span>
        <span onclick="loadFrame(this,'auto')">2027</span>
        <span onclick="loadFrame(this,'nogid')">Paruh</span>
        <span onclick="openDrive()">Drive</span>

        <button class="btn" onclick="refreshFrame()">🔄</button>
        <button class="btn" onclick="printFrame()">🖨</button>
    </div>
</div>

<!-- MOBILE MENU -->
<div class="sidebar" id="sidebar">
    <span onclick="loadFrameMobile('live')">GAJI 2026</span>
    <span onclick="loadFrameMobile('auto')">GAJI 2027</span>
    <span onclick="loadFrameMobile('nogid')">PARUH WAKTU</span>
    <span onclick="openDrive()">SELENGKAPNYA</span>
    <span onclick="refreshFrame()">🔄 Refresh</span>
    <span onclick="printFrame()">🖨 Print</span>
</div>

<div class="overlay-menu" id="overlayMenu" onclick="toggleMenu()"></div>

<div class="main">
    <div class="status" id="status">Terakhir diperbarui: -</div>

    <div class="card">
        <div class="iframe-wrapper">
            <iframe id="frame"></iframe>
        </div>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="loader"></div>
</div>

<script>
let currentURL = "";

const urls = {
    live: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZsBA_TeLq6n4PrNuJCXu6wcb9pLrFgOlt5-XYeE36laNYDyAsIYZsegCpimpYqPyZgdsFnVufCPLx/pubhtml?widget=true&headers=false",
    auto: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQxf_X6dfVDKPbeUU1BJUHEEgUrlDco1gg1PbeW3zVvzIaWXOKPdVl9Yb5xWNMtcST72ZK-XVeF-bkv/pubhtml?widget=true&headers=false",
    nogid: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzheNoPSUBL51N_QRLTiaZLyPkWK6-sfhTVVTVjwu9_r5idwjBLxaukKhcOXVWhHpLzEn6_AzEijnO/pubhtml?widget=true&headers=false"
};

function loadFrame(el,type){
    currentURL = urls[type];
    startLoading();
    document.getElementById("frame").src = currentURL;

    if(el){
        document.querySelectorAll(".menu span").forEach(e=>e.classList.remove("active"));
        el.classList.add("active");
    }
}

function loadFrameMobile(type){
    toggleMenu();
    loadFrame(null,type);
}

function refreshFrame(){
    if(!currentURL) return;
    startLoading();
    document.getElementById("frame").src = currentURL + "&t=" + Date.now();
}

function printFrame(){
    if(!currentURL) return;

    const win = window.open(currentURL, "_blank");
    setTimeout(()=>{ win.print(); },1200);
}

function openDrive(){
    window.open("https://drive.google.com/drive/folders/1GfuS0oksQCSDwwXWN999Sp2YHRfOANOs","_blank");
}

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlayMenu").classList.toggle("active");
}

function startLoading(){
    document.getElementById("overlay").classList.add("active");
    document.getElementById("progress").style.width="70%";
}

function stopLoading(){
    document.getElementById("progress").style.width="100%";
    setTimeout(()=>{
        document.getElementById("progress").style.width="0%";
        document.getElementById("overlay").classList.remove("active");
    },300);
}

function updateTime(){
    document.getElementById("status").innerText =
        "Terakhir diperbarui: " + new Date().toLocaleTimeString("id-ID");
}

document.getElementById("frame").onload=()=>{
    stopLoading();
    updateTime();
};

window.onload=()=>{
    loadFrame(null,"live");
};
</script>

</body>
</html>
