<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Google Sheets</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #020617;
    padding: 15px 25px;
    position: sticky;
    top: 0;
}

.navbar .title {
    color: #38bdf8;
    font-size: 20px;
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 20px;
    align-items: center;
}

.menu span {
    cursor: pointer;
    color: #94a3b8;
}

.menu span:hover,
.active {
    color: #38bdf8;
    font-weight: bold;
}

/* BUTTON REFRESH */
.refresh-btn {
    cursor: pointer;
    background: #38bdf8;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    color: #020617;
    font-weight: bold;
}

.refresh-btn:hover {
    background: #0ea5e9;
}

/* MAIN */
.main {
    padding: 20px;
}

.card {
    margin-top: 15px;
    background: #020617;
    padding: 10px;
    border-radius: 12px;
}

/* IFRAME */
iframe {
    width: 100%;
    height: calc(100vh - 140px);
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="title">📊 Dashboard</div>
    <div class="menu">
        <span onclick="loadFrame(this, 'live')">✔ DESK GAJI 2026</span> 
        <span onclick="loadFrame(this, 'auto')">✔ DESK GAJI 2027</span> 
        <span onclick="loadFrame(this, 'nogid')">✔ DESK PARUH WAKTU</span> 
        
        <!-- Tombol Refresh -->
        <button class="refresh-btn" onclick="refreshFrame()">🔄 Refresh</button>
    </div>
</div>

<div class="main">
    <div class="card">
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
let currentURL = "";
let refreshInterval;

// URL mapping
const urls = {
    live: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZsBA_TeLq6n4PrNuJCXu6wcb9pLrFgOlt5-XYeE36laNYDyAsIYZsegCpimpYqPyZgdsFnVufCPLx/pubhtml?widget=true&headers=false",
    auto: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQxf_X6dfVDKPbeUU1BJUHEEgUrlDco1gg1PbeW3zVvzIaWXOKPdVl9Yb5xWNMtcST72ZK-XVeF-bkv/pubhtml?widget=true&headers=false",
    nogid: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzheNoPSUBL51N_QRLTiaZLyPkWK6-sfhTVVTVjwu9_r5idwjBLxaukKhcOXVWhHpLzEn6_AzEijnO/pubhtml?widget=true&headers=false"
};

function loadFrame(el, type) {
    const frame = document.getElementById("frame");
    currentURL = urls[type];
    frame.src = currentURL;

    // reset auto refresh
    clearInterval(refreshInterval);
    refreshInterval = setInterval(refreshFrame, 5000);

    // active menu
    document.querySelectorAll(".menu span").forEach(item => item.classList.remove("active"));
    el.classList.add("active");
}

function refreshFrame() {
    const frame = document.getElementById("frame");

    // reload tanpa cache
    frame.src = currentURL + "&t=" + new Date().getTime();
}

// default load
window.onload = () => {
    const firstMenu = document.querySelectorAll(".menu span")[0];
    loadFrame(firstMenu, "live");
};
</script>

</body>
</html>
