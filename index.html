<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Google Sheets</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #020617;
    padding: 20px;
}

.sidebar h2 {
    color: #38bdf8;
}

.sidebar p {
    color: #94a3b8;
    font-size: 13px;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Header */
.header h1 {
    margin: 0;
}

/* Card */
.card {
    margin-top: 15px;
    background: #020617;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

/* Iframe */
iframe {
    width: 100%;
    height: 85vh;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>📊 Dashboard</h2>
    <p>Google Sheets Viewer</p>
    <hr style="border-color:#1e293b;">
    <p>✔ Live Data</p>
    <p>✔ Auto Update</p>
    <p>✔ No GID Needed</p>
</div>

<div class="main">

    <div class="header">
        <h1>Dashboard Data</h1>
        <p>Realtime dari Google Sheets</p>
    </div>

    <div class="card">

        <!-- 🔥 IFRAME KAMU -->
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQZsBA_TeLq6n4PrNuJCXu6wcb9pLrFgOlt5-XYeE36laNYDyAsIYZsegCpimpYqPyZgdsFnVufCPLx/pubhtml?widget=true&headers=false"></iframe>

    </div>

</div>

</body>
</html>
